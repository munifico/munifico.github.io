<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J's Dashboard</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>
<style>
:root {
  --font-body: 'Satoshi', 'Inter', sans-serif;
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;
  --transition: 180ms cubic-bezier(0.16,1,0.3,1);
}
:root,[data-theme="dark"] {
  --color-bg:#111110;--color-surface:#1a1917;--color-surface-2:#201f1d;
  --color-surface-offset:#272522;--color-border:#333230;--color-divider:#2a2926;
  --color-text:#e8e6e3;--color-text-muted:#888580;--color-text-faint:#4a4845;--color-text-inverse:#1a1917;
  --color-primary:#4f98a3;--color-primary-hover:#3d8090;--color-primary-highlight:#1e3535;
  --color-up:#4ade80;--color-down:#f87171;--color-flat:#888580;
  --shadow-sm:0 1px 3px oklch(0 0 0/.3);--shadow-md:0 4px 12px oklch(0 0 0/.4);
}
[data-theme="light"] {
  --color-bg:#f5f4f0;--color-surface:#fafaf8;--color-surface-2:#ffffff;
  --color-surface-offset:#eeede9;--color-border:#dcdbd6;--color-divider:#e4e3de;
  --color-text:#1c1b18;--color-text-muted:#6b6a66;--color-text-faint:#c0bfbb;--color-text-inverse:#fafaf8;
  --color-primary:#017380;--color-primary-hover:#015a65;--color-primary-highlight:#d0e8eb;
  --color-up:#16a34a;--color-down:#dc2626;--color-flat:#6b6a66;
  --shadow-sm:0 1px 3px oklch(0.2 0.01 80/.08);--shadow-md:0 4px 12px oklch(0.2 0.01 80/.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-body,sans-serif);font-size:var(--text-sm);color:var(--color-text);background:var(--color-bg);-webkit-font-smoothing:antialiased;transition:background var(--transition),color var(--transition);}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
.app{display:grid;grid-template-rows:auto 1fr;height:100dvh;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-6);background:var(--color-surface);border-bottom:1px solid var(--color-border);gap:var(--space-4);position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:var(--space-3);}
.header-title{font-size:var(--text-base);font-weight:700;letter-spacing:-0.01em;}
.header-subtitle{font-size:var(--text-xs);color:var(--color-text-muted);}
.header-right{display:flex;align-items:center;gap:var(--space-3);}
.last-updated{font-size:var(--text-xs);color:var(--color-text-faint);}
.btn-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);color:var(--color-text-muted);transition:background var(--transition),color var(--transition);}
.btn-icon:hover{background:var(--color-surface-offset);color:var(--color-text);}
.btn-refresh{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);font-size:var(--text-xs);font-weight:500;color:var(--color-primary);border:1px solid var(--color-primary-highlight);background:var(--color-primary-highlight);transition:all var(--transition);}
.btn-refresh:hover{background:var(--color-primary);color:var(--color-text-inverse);border-color:var(--color-primary);}
.btn-refresh.spinning svg{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* MAIN */
.main{overflow-y:auto;overscroll-behavior:contain;padding:var(--space-4);background:var(--color-bg);}
.grid-stack{background:transparent!important;}
.grid-stack-item-content{overflow:hidden;}

/* WIDGET */
.widget{height:100%;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow var(--transition);}
.widget:hover{box-shadow:var(--shadow-md);}
.widget-header{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--color-divider);flex-shrink:0;}
.widget-title-row{display:flex;align-items:center;gap:var(--space-2);}
.widget-icon{color:var(--color-text-muted);flex-shrink:0;}
.widget-title{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);}
.widget-badge{font-size:var(--text-xs);padding:1px 6px;border-radius:9999px;background:var(--color-surface-offset);color:var(--color-text-faint);}
.widget-body{flex:1;overflow:hidden;padding:var(--space-3) var(--space-4);display:flex;flex-direction:column;gap:var(--space-2);}

/* TICKER */
.ticker-row{display:flex;align-items:center;justify-content:space-between;padding:var(--space-2) 0;border-bottom:1px solid var(--color-divider);transition:background var(--transition);}
.ticker-row:last-child{border-bottom:none;}
.ticker-left{display:flex;flex-direction:column;gap:2px;}
.ticker-symbol{font-size:var(--text-sm);font-weight:600;color:var(--color-text);}
.ticker-name{font-size:var(--text-xs);color:var(--color-text-muted);}
.ticker-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.ticker-price{font-size:var(--text-sm);font-weight:600;font-variant-numeric:tabular-nums lining-nums;color:var(--color-text);}
.ticker-change{font-size:var(--text-xs);font-weight:500;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:2px;}
.ticker-change.up{color:var(--color-up);}
.ticker-change.down{color:var(--color-down);}
.ticker-change.flat{color:var(--color-flat);}

/* WEATHER */
.weather-main{display:flex;align-items:center;gap:var(--space-4);padding-bottom:var(--space-3);border-bottom:1px solid var(--color-divider);margin-bottom:var(--space-3);}
.weather-temp{font-size:var(--text-xl);font-weight:700;color:var(--color-text);line-height:1;}
.weather-icon{font-size:2.5rem;line-height:1;}
.weather-desc{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:2px;}
.weather-details{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);}
.weather-detail-item{display:flex;flex-direction:column;gap:2px;}
.weather-detail-label{font-size:var(--text-xs);color:var(--color-text-muted);}
.weather-detail-value{font-size:var(--text-sm);font-weight:600;color:var(--color-text);}
.weather-forecast{display:flex;gap:var(--space-2);margin-top:var(--space-3);padding-top:var(--space-3);border-top:1px solid var(--color-divider);overflow-x:auto;}
.forecast-item{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:44px;flex-shrink:0;}
.forecast-day{font-size:var(--text-xs);color:var(--color-text-muted);}
.forecast-emoji{font-size:1.2rem;}
.forecast-temp{font-size:var(--text-xs);font-weight:600;}

/* NEWS */
.news-item{display:flex;gap:var(--space-3);padding:var(--space-2) 0;border-bottom:1px solid var(--color-divider);cursor:pointer;transition:background var(--transition);text-decoration:none;color:inherit;}
.news-item:last-child{border-bottom:none;}
.news-item:hover{background:var(--color-surface-offset);margin:0 calc(-1 * var(--space-4));padding-left:var(--space-4);padding-right:var(--space-4);}
.news-rank{font-size:var(--text-xs);font-weight:700;color:var(--color-primary);min-width:18px;flex-shrink:0;margin-top:2px;}
.news-content{flex:1;min-width:0;}
.news-title{font-size:var(--text-xs);font-weight:500;color:var(--color-text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.news-meta{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:3px;}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--color-surface-offset) 25%,var(--color-divider) 50%,var(--color-surface-offset) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--radius-sm);}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton-row{height:36px;margin-bottom:var(--space-2);}
.skeleton-row:last-child{width:70%;}
.error-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:var(--space-2);color:var(--color-text-muted);font-size:var(--text-xs);text-align:center;padding:var(--space-4);}
.error-state svg{color:var(--color-text-faint);}

@keyframes flashUp{0%,100%{background:transparent}50%{background:oklch(from var(--color-up) l c h / 0.15)}}
@keyframes flashDown{0%,100%{background:transparent}50%{background:oklch(from var(--color-down) l c h / 0.15)}}
.flash-up{animation:flashUp .6s ease;}
.flash-down{animation:flashDown .6s ease;}

.main::-webkit-scrollbar{width:6px;}
.main::-webkit-scrollbar-track{background:transparent;}
.main::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:3px;}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="J Dashboard">
        <rect width="28" height="28" rx="7" fill="var(--color-primary)"/>
        <rect x="8" y="8" width="5" height="12" rx="1.5" fill="white" opacity="0.9"/>
        <rect x="15" y="8" width="5" height="7" rx="1.5" fill="white" opacity="0.6"/>
        <rect x="15" y="17" width="5" height="3" rx="1.5" fill="white" opacity="0.35"/>
      </svg>
      <div>
        <div class="header-title">J's Dashboard</div>
        <div class="header-subtitle">서울 · Market Overview</div>
      </div>
    </div>
    <div class="header-right">
      <span class="last-updated" id="lastUpdated">불러오는 중...</span>
      <button class="btn-refresh" id="btnRefresh" onclick="refreshAll()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        새로고침
      </button>
      <button class="btn-icon" id="themeToggle" aria-label="테마 전환">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="grid-stack" id="grid">

      <!-- 날씨 -->
      <div class="grid-stack-item" gs-x="0" gs-y="0" gs-w="3" gs-h="6">
        <div class="grid-stack-item-content">
          <div class="widget">
            <div class="widget-header">
              <div class="widget-title-row">
                <svg class="widget-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>
                <span class="widget-title">날씨</span>
              </div>
              <span class="widget-badge">서울</span>
            </div>
            <div class="widget-body" id="weatherBody"><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div></div>
          </div>
        </div>
      </div>

      <!-- 환율/원자재 -->
      <div class="grid-stack-item" gs-x="3" gs-y="0" gs-w="3" gs-h="6">
        <div class="grid-stack-item-content">
          <div class="widget">
            <div class="widget-header">
              <div class="widget-title-row">
                <svg class="widget-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg>
                <span class="widget-title">환율 / 원자재</span>
              </div>
              <span class="widget-badge">FX · CMX</span>
            </div>
            <div class="widget-body" id="forexBody"><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div></div>
          </div>
        </div>
      </div>

      <!-- 국내 주식 -->
      <div class="grid-stack-item" gs-x="6" gs-y="0" gs-w="3" gs-h="3">
        <div class="grid-stack-item-content">
          <div class="widget">
            <div class="widget-header">
              <div class="widget-title-row">
                <svg class="widget-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                <span class="widget-title">국내 지수</span>
              </div>
              <span class="widget-badge">KR</span>
            </div>
            <div class="widget-body" id="koreanBody"><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div></div>
          </div>
        </div>
      </div>

      <!-- 해외 주식 -->
      <div class="grid-stack-item" gs-x="9" gs-y="0" gs-w="3" gs-h="3">
        <div class="grid-stack-item-content">
          <div class="widget">
            <div class="widget-header">
              <div class="widget-title-row">
                <svg class="widget-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                <span class="widget-title">해외 ETF</span>
              </div>
              <span class="widget-badge">US</span>
            </div>
            <div class="widget-body" id="usStockBody"><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div></div>
          </div>
        </div>
      </div>

      <!-- 코인 -->
      <div class="grid-stack-item" gs-x="6" gs-y="3" gs-w="3" gs-h="3">
        <div class="grid-stack-item-content">
          <div class="widget">
            <div class="widget-header">
              <div class="widget-title-row">
                <svg class="widget-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11.767 19.089c4.924.868 6.14-6.025 1.216-6.894m-1.216 6.894L5.86 18.047m5.908 1.042-.347 1.97m1.563-8.864c4.924.869 6.14-6.025 1.215-6.893m-1.215 6.893-3.94-.694m5.155-6.2L8.29 4.26m5.908 1.042.348-1.97M7.48 20.364l3.126-17.727"/></svg>
                <span class="widget-title">가상자산</span>
              </div>
              <span class="widget-badge">Crypto</span>
            </div>
            <div class="widget-body" id="cryptoBody"><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div></div>
          </div>
        </div>
      </div>

      <!-- 뉴스 -->
      <div class="grid-stack-item" gs-x="9" gs-y="3" gs-w="3" gs-h="3">
        <div class="grid-stack-item-content">
          <div class="widget">
            <div class="widget-header">
              <div class="widget-title-row">
                <svg class="widget-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
                <span class="widget-title">밤사이 주요 뉴스</span>
              </div>
              <span class="widget-badge">Top 5</span>
            </div>
            <div class="widget-body" id="newsBody" style="padding:var(--space-2) var(--space-4);overflow-y:auto;"><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div></div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script>
/* THEME */
(function(){
  const toggle=document.getElementById('themeToggle');
  const root=document.documentElement;
  let theme='dark';
  root.setAttribute('data-theme',theme);
  const SUN=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
  const MOON=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  toggle.addEventListener('click',()=>{
    theme=theme==='dark'?'light':'dark';
    root.setAttribute('data-theme',theme);
    toggle.innerHTML=theme==='dark'?MOON:SUN;
  });
})();

/* GRIDSTACK */
const grid=GridStack.init({cellHeight:60,margin:8,resizable:{handles:'se,sw'},animate:true,float:false,minRow:1});
grid.on('change',()=>{try{sessionStorage.setItem('jdash-layout',JSON.stringify(grid.save(false)));}catch(e){}});
try{const sv=JSON.parse(sessionStorage.getItem('jdash-layout')||'null');if(sv&&sv.length)grid.load(sv);}catch(e){}

/* HELPERS */
function fmtNum(n,d=2){if(n==null||isNaN(n))return'—';return new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);}
function fmtKRW(n){if(n==null||isNaN(n))return'—';return new Intl.NumberFormat('ko-KR').format(Math.round(n));}
function cls(p){return p>0?'up':p<0?'down':'flat';}
function arr(p){return p>0?'▲':p<0?'▼':'—';}
function flash(el,p){el.classList.remove('flash-up','flash-down');void el.offsetWidth;if(p>0)el.classList.add('flash-up');else if(p<0)el.classList.add('flash-down');}
function tickerRow(sym,name,priceStr,pct){
  const c=cls(pct),a=arr(pct),s=pct>0?'+':'';
  return `<div class="ticker-row">
    <div class="ticker-left"><span class="ticker-symbol">${sym}</span><span class="ticker-name">${name}</span></div>
    <div class="ticker-right"><span class="ticker-price">${priceStr}</span><span class="ticker-change ${c}">${a} ${s}${pct!=null?pct.toFixed(2):'—'}%</span></div>
  </div>`;
}
function skelRows(n=3){return Array.from({length:n},()=>`<div class="skeleton skeleton-row"></div>`).join('');}
function errState(msg='데이터 불러오기 실패'){return `<div class="error-state"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg><span>${msg}</span></div>`;}

/* WEATHER */
const WMO={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
const WD={0:'맑음',1:'대체로 맑음',2:'구름 조금',3:'흐림',45:'안개',48:'안개',51:'이슬비',53:'이슬비',55:'이슬비',61:'비',63:'비',65:'강한 비',71:'눈',73:'눈',75:'강한 눈',80:'소나기',81:'강한 소나기',82:'폭우',95:'천둥번개',96:'뇌우',99:'뇌우'};
const DAYS=['일','월','화','수','목','금','토'];

async function loadWeather(){
  const body=document.getElementById('weatherBody');
  body.innerHTML=skelRows(4);
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_mean&timezone=Asia%2FSeoul&forecast_days=5');
    const d=await r.json();
    const c=d.current,dl=d.daily,code=c.weathercode;
    const emoji=WMO[code]||'🌡️',desc=WD[code]||'';
    let fc='';
    for(let i=0;i<5;i++){
      const date=new Date(dl.time[i]);
      const day=i===0?'오늘':DAYS[date.getDay()]+'요';
      fc+=`<div class="forecast-item"><span class="forecast-day">${day}</span><span class="forecast-emoji">${WMO[dl.weathercode[i]]||'🌡️'}</span><span class="forecast-temp">${Math.round(dl.temperature_2m_max[i])}°</span></div>`;
    }
    body.innerHTML=`
      <div class="weather-main">
        <span class="weather-icon">${emoji}</span>
        <div>
          <div class="weather-temp">${Math.round(c.temperature_2m)}°C</div>
          <div class="weather-desc">${desc}</div>
          <div class="weather-desc">체감 ${Math.round(c.apparent_temperature)}°C</div>
        </div>
      </div>
      <div class="weather-details">
        <div class="weather-detail-item"><span class="weather-detail-label">습도</span><span class="weather-detail-value">${c.relative_humidity_2m}%</span></div>
        <div class="weather-detail-item"><span class="weather-detail-label">풍속</span><span class="weather-detail-value">${c.wind_speed_10m} km/h</span></div>
        <div class="weather-detail-item"><span class="weather-detail-label">강수확률</span><span class="weather-detail-value">${dl.precipitation_probability_mean[0]??'—'}%</span></div>
        <div class="weather-detail-item"><span class="weather-detail-label">최저/최고</span><span class="weather-detail-value">${Math.round(dl.temperature_2m_min[0])}°/${Math.round(dl.temperature_2m_max[0])}°</span></div>
      </div>
      <div class="weather-forecast">${fc}</div>`;
  }catch(e){body.innerHTML=errState('날씨 오류');}
}

/* YAHOO via allorigins */
async function fetchYahoo(symbols){
  const qs=symbols.map(s=>encodeURIComponent(s)).join('%2C');
  const api=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${qs}&fields=regularMarketPrice,regularMarketChangePercent,symbol`;
  const proxy=`https://api.allorigins.win/raw?url=${encodeURIComponent(api)}`;
  const r=await fetch(proxy);
  const d=await r.json();
  return d?.quoteResponse?.result||[];
}

/* NEWS RSS */
async function loadNews(){
  const body=document.getElementById('newsBody');
  body.innerHTML=skelRows(3);
  const feeds=[
    'https://feeds.reuters.com/reuters/businessNews',
    'https://rss.cnn.com/rss/money_news_international.rss',
    'https://www.yonhapnewstv.co.kr/browse/feed/',
  ];
  for(const rss of feeds){
    try{
      const url=`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}&count=5`;
      const r=await fetch(url);
      const d=await r.json();
      if(!d.items||d.items.length===0)continue;
      body.innerHTML=d.items.slice(0,5).map((item,i)=>{
        const title=item.title.replace(/<[^>]*>/g,'').trim();
        const date=new Date(item.pubDate);
        const t=isNaN(date)?'':date.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
        const src=d.feed?.title||'';
        return `<a class="news-item" href="${item.link}" target="_blank" rel="noopener noreferrer">
          <span class="news-rank">${i+1}</span>
          <div class="news-content">
            <div class="news-title">${title}</div>
            <div class="news-meta">${src}${t?' · '+t:''}</div>
          </div>
        </a>`;
      }).join('');
      return;
    }catch(e){continue;}
  }
  body.innerHTML=errState('뉴스 불러오기 실패');
}

/* REFRESH */
function updateTS(){
  const now=new Date();
  document.getElementById('lastUpdated').textContent='업데이트 '+now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

async function refreshAll(){
  const btn=document.getElementById('btnRefresh');
  btn.classList.add('spinning');
  try{
    await Promise.all([loadWeather(),loadCrypto(),loadForex(),loadKorean(),loadUSStock(),loadNews()]);
    updateTS();
  }finally{btn.classList.remove('spinning');}
}

window.addEventListener('load',()=>{
  refreshAll();
  setInterval(refreshAll, 3*60*1000);
});
